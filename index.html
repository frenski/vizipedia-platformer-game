<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Loading…</title><!-- Updated by JS from game.json -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Toolbar: title (from JSON) + Play/Pause/Reset -->
  <div id="toolbar">
    <span id="gameTitle">Loading…</span>
    <div class="toolbar-btns">
      <button class="tbtn primary" id="btnPlay">▶ Play</button>
      <button class="tbtn"         id="btnPause">⏸ Pause</button>
      <button class="tbtn danger"  id="btnReset">↺ Reset</button>
    </div>
  </div>

  <!-- Game canvas — fills all remaining height -->
  <div id="stage">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
      <p class="overlay-sub">Loading…</p>
    </div>
  </div>

  <!-- Touch controls — shown only on mobile -->
  <div id="touch">
    <div class="dpad">
      <div class="dpad-btn" id="tc-left">◀</div>
      <div class="dpad-btn" id="tc-up">▲</div>
      <div class="dpad-btn" id="tc-right">▶</div>
    </div>
    <div class="jump-btn" id="tc-jump">⬆</div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>

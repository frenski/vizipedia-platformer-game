<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Top HUD bar ───────────────────────────────────── -->
  <div id="toolbar">

    <!-- Pause button -->
    <button class="hud-circle-btn" id="btnPause" title="Pause">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="1" width="4" height="14" rx="2" fill="currentColor"/>
        <rect x="10" y="1" width="4" height="14" rx="2" fill="currentColor"/>
      </svg>
    </button>

    <!-- Score pill with stars -->
    <div class="hud-pill" id="hudScore">
      <div class="hud-stars">
        <span class="star s1">★</span><span class="star s2">★</span><span class="star s3">★</span>
      </div>
      <div class="hud-score-label">SCORE: <span id="hudScoreVal">0</span></div>
    </div>

    <!-- Title banner (centre) -->
    <div class="hud-centre">
      <div class="hud-title-banner">
        <span id="gameTitle">Loading…</span>
      </div>
      <div class="hud-lives" id="hudLives">
        <span class="heart full"></span>
        <span class="heart full"></span>
        <span class="heart empty"></span>
      </div>
    </div>

    <!-- Timer pill -->
    <div class="hud-pill hud-timer">
      <span id="hudTimer">00:00</span>
    </div>

    <!-- Music button -->
    <button class="hud-circle-btn" id="btnMusic" title="Music">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 12V4L14 2.5v9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="4.5" cy="12" r="2" fill="currentColor"/>
        <circle cx="12.5" cy="10.5" r="2" fill="currentColor"/>
      </svg>
    </button>

  </div>

  <!-- ── Game stage ─────────────────────────────────────── -->
  <div id="stage">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
      <p class="overlay-sub">Loading…</p>
    </div>
  </div>

  <!-- ── Touch controls ────────────────────────────────── -->
  <div id="touch">
    <div class="dpad">
      <button class="dpad-btn" id="tc-left">◀</button>
      <button class="dpad-btn" id="tc-right">▶</button>
    </div>
    <button class="jump-btn" id="tc-jump">
      <span class="jump-icon">🏃</span>
      <span class="jump-label">JUMP</span>
    </button>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
